<svg width="680" viewBox="0 0 680 670" xmlns="http://www.w3.org/2000/svg" role="img">
<title>SRE incident intake and triage agent — pipeline architecture</title>
<desc>Three-column layout: inputs on the left, five pipeline stages in the center, outputs on the right.</desc>
<defs>
  <style>
    text { font-family: ui-sans-serif, system-ui, sans-serif; }
    .th  { font-size: 14px; font-weight: 500; fill: #2C2C2A; }
    .ts  { font-size: 12px; font-weight: 400; fill: #5F5E5A; }
    .c-gray  rect { fill: #F1EFE8; stroke: #5F5E5A; }
    .c-gray  .th  { fill: #2C2C2A; }
    .c-gray  .ts  { fill: #5F5E5A; }
    .c-amber rect { fill: #FAEEDA; stroke: #854F0B; }
    .c-amber .th  { fill: #412402; }
    .c-amber .ts  { fill: #854F0B; }
    .c-purple rect { fill: #EEEDFE; stroke: #534AB7; }
    .c-purple .th  { fill: #26215C; }
    .c-purple .ts  { fill: #534AB7; }
    .c-blue  rect { fill: #E6F1FB; stroke: #185FA5; }
    .c-blue  .th  { fill: #042C53; }
    .c-blue  .ts  { fill: #185FA5; }
    .c-teal  rect { fill: #E1F5EE; stroke: #0F6E56; }
    .c-teal  .th  { fill: #04342C; }
    .c-teal  .ts  { fill: #0F6E56; }
    .c-green rect { fill: #EAF3DE; stroke: #3B6D11; }
    .c-green .th  { fill: #173404; }
    .c-green .ts  { fill: #3B6D11; }
    .c-coral rect { fill: #FAECE7; stroke: #993C1D; }
    .c-coral .ts  { fill: #712B13; }
    line, path { stroke: #888780; }
    .arr { stroke-width: 1.5; fill: none; }
    .div { stroke: #D3D1C7; stroke-width: 0.5; }
    .lbl { stroke: #B4B2A9; stroke-width: 1.5; stroke-dasharray: 5 4; fill: none; }
  </style>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<text class="ts" x="93" y="50" text-anchor="middle" fill="#888780">inputs</text>
<text class="ts" x="337" y="50" text-anchor="middle" fill="#888780">pipeline</text>
<text class="ts" x="550" y="50" text-anchor="middle" fill="#888780">outputs</text>
<line class="div" x1="15" y1="58" x2="171" y2="58"/>
<line class="div" x1="232" y1="58" x2="442" y2="58"/>
<line class="div" x1="462" y1="58" x2="638" y2="58"/>

<g class="c-gray"><rect x="15" y="72" width="156" height="44" rx="8" stroke-width="0.5"/><text class="th" x="93" y="94" text-anchor="middle" dominant-baseline="central">Reporter form</text></g>
<g class="c-gray"><rect x="15" y="134" width="156" height="44" rx="8" stroke-width="0.5"/><text class="th" x="93" y="156" text-anchor="middle" dominant-baseline="central">Log · image</text></g>
<g class="c-amber"><rect x="15" y="222" width="156" height="56" rx="8" stroke-width="0.5"/><text class="th" x="93" y="241" text-anchor="middle" dominant-baseline="central">RAG · Medusa</text><text class="ts" x="93" y="259" text-anchor="middle" dominant-baseline="central">FAISS · top 3</text></g>

<line class="arr" x1="171" y1="94" x2="232" y2="94" marker-end="url(#arrow)"/>
<path class="arr" d="M171 156 L200 156 L200 106 L232 106" marker-end="url(#arrow)"/>
<path class="arr" d="M171 250 L200 250 L200 230 L232 230" marker-end="url(#arrow)"/>

<g class="c-gray"><rect x="232" y="72" width="210" height="56" rx="8" stroke-width="0.5"/><text class="th" x="337" y="91" text-anchor="middle" dominant-baseline="central">Ingest</text><text class="ts" x="337" y="109" text-anchor="middle" dominant-baseline="central">validate · guardrails</text></g>
<line class="arr" x1="337" y1="128" x2="337" y2="202" marker-end="url(#arrow)"/>
<g class="c-purple"><rect x="232" y="202" width="210" height="56" rx="8" stroke-width="0.5"/><text class="th" x="337" y="221" text-anchor="middle" dominant-baseline="central">Triage</text><text class="ts" x="337" y="239" text-anchor="middle" dominant-baseline="central">LLM ×3 · RAG context</text></g>
<line class="arr" x1="337" y1="258" x2="337" y2="340" marker-end="url(#arrow)"/>
<g class="c-blue"><rect x="232" y="340" width="210" height="56" rx="8" stroke-width="0.5"/><text class="th" x="337" y="359" text-anchor="middle" dominant-baseline="central">Ticket</text><text class="ts" x="337" y="377" text-anchor="middle" dominant-baseline="central">mock Linear · persist</text></g>
<line class="arr" x1="337" y1="396" x2="337" y2="440" marker-end="url(#arrow)"/>
<g class="c-teal"><rect x="232" y="440" width="210" height="56" rx="8" stroke-width="0.5"/><text class="th" x="337" y="459" text-anchor="middle" dominant-baseline="central">Notify team</text><text class="ts" x="337" y="477" text-anchor="middle" dominant-baseline="central">Slack · email</text></g>
<line class="lbl" x1="337" y1="496" x2="337" y2="528" marker-end="url(#arrow)"/>
<g class="c-coral"><rect x="259" y="528" width="156" height="26" rx="13" stroke-width="0.5"/><text class="ts" x="337" y="541" text-anchor="middle" dominant-baseline="central">human · mark resolved</text></g>
<line class="lbl" x1="337" y1="554" x2="337" y2="580" marker-end="url(#arrow)"/>
<g class="c-green"><rect x="232" y="580" width="210" height="56" rx="8" stroke-width="0.5"/><text class="th" x="337" y="599" text-anchor="middle" dominant-baseline="central">Resolve</text><text class="ts" x="337" y="617" text-anchor="middle" dominant-baseline="central">LLM notes · notify</text></g>

<line class="arr" x1="442" y1="368" x2="462" y2="368" marker-end="url(#arrow)"/>
<path class="arr" d="M442 462 L452 462 L452 452 L462 452" marker-end="url(#arrow)"/>
<path class="arr" d="M442 474 L452 474 L452 510 L462 510" marker-end="url(#arrow)"/>
<path class="arr" d="M442 608 L452 608 L452 602 L462 602" marker-end="url(#arrow)"/>

<g class="c-blue"><rect x="462" y="347" width="176" height="44" rx="8" stroke-width="0.5"/><text class="th" x="550" y="362" text-anchor="middle" dominant-baseline="central">INC-XXXXXXXX</text><text class="ts" x="550" y="380" text-anchor="middle" dominant-baseline="central">ticket created</text></g>
<g class="c-teal"><rect x="462" y="430" width="176" height="44" rx="8" stroke-width="0.5"/><text class="th" x="550" y="445" text-anchor="middle" dominant-baseline="central">Slack #incidents</text><text class="ts" x="550" y="463" text-anchor="middle" dominant-baseline="central">hypothesis · runbook</text></g>
<g class="c-teal"><rect x="462" y="488" width="176" height="44" rx="8" stroke-width="0.5"/><text class="th" x="550" y="503" text-anchor="middle" dominant-baseline="central">Team email</text><text class="ts" x="550" y="521" text-anchor="middle" dominant-baseline="central">summary · runbook</text></g>
<g class="c-green"><rect x="462" y="580" width="176" height="44" rx="8" stroke-width="0.5"/><text class="th" x="550" y="595" text-anchor="middle" dominant-baseline="central">Reporter email</text><text class="ts" x="550" y="613" text-anchor="middle" dominant-baseline="central">LLM resolution note</text></g>
</svg>

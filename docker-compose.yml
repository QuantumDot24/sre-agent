services:

  # ── Model downloader (runs once at first launch, then exits) ────────────────
  # Downloads the two GGUF files from HuggingFace and renames them to match
  # the paths expected by inference.py (removes the "Qwen." prefix).
  model-downloader:
    image: python:3.11-slim
    volumes:
      - ./models:/models
    environment:
      HF_REPO: DevQuasar/Qwen.Qwen3.5-0.8B-GGUF
      HF_TOKEN: ${HF_TOKEN:-}       # optional — only needed for gated repos
    command: >
      bash -c "
        pip install -q huggingface-hub==0.30.2 &&
        python -c \"
        import os, shutil
        from huggingface_hub import hf_hub_download
        
        repo  = os.environ['HF_REPO']
        token = os.environ.get('HF_TOKEN') or None
        dest  = '/models'

        files = {
            'mmproj-Qwen.Qwen3.5-0.8B.f16.gguf' : 'mmproj-Qwen3.5-0.8B.f16.gguf',
            'Qwen.Qwen3.5-0.8B.Q4_K_M.gguf'     : 'Qwen3.5-0.8B.Q4_K_M.gguf',
        }

        for hf_name, local_name in files.items():
            out = os.path.join(dest, local_name)
            if os.path.exists(out):
                print(f'[skip] {local_name} already present')
                continue
            print(f'[download] {hf_name} ...')
            tmp = hf_hub_download(repo_id=repo, filename=hf_name, token=token)
            shutil.copy(tmp, out)
            print(f'[ok] saved as {local_name}')
        \"
      "

  # ── SRE Agent ───────────────────────────────────────────────────────────────
  sre-agent:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models        # GGUF model files
      - ./data:/app/data            # tickets.json, chroma, notifications.jsonl
    env_file:
      - .env
    environment:
      MODELS_DIR: /app/models
      LLM_CTX: "8192"
      LLM_GPU_LAYERS: "35"
      LOG_LEVEL: INFO
      LOG_FORMAT: json
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    depends_on:
      model-downloader:
        condition: service_completed_successfully
    restart: unless-stopped